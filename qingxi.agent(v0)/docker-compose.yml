services:
  db:
    image: postgres:16-alpine
    container_name: qingxi-db
    environment:
      POSTGRES_USER: qingxi
      POSTGRES_PASSWORD: qingxi_dev_2026
      POSTGRES_DB: qingxi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qingxi"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qingxi-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://qingxi:qingxi_dev_2026@db:5432/qingxi
      - LLM_PROVIDER=deepseek
      - LLM_API_KEY=sk-274ad5989a294e71ba7717e5984b5db1
      - CHROMA_PERSIST_DIR=/app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qingxi-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data: